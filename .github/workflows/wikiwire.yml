# this CI workflow is very specific to the OW and contains multiple technical work-arounds that might not apply to your wiki.
# learn more about WikiWire: https://github.com/obbywiki/wikiwire

name: WikiWire

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'modules/*'
      - 'templates/**'
      - 'templates/*'

jobs:
  wikiwire:
    runs-on: ubuntu-latest
    name: Sync files to production MediaWiki

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Darklua
        run: |
          wget -q https://github.com/seaofvoices/darklua/releases/download/v0.19.0/darklua-linux-x86_64.zip
          unzip -q darklua-linux-x86_64.zip
          chmod +x darklua

      - name: Setup Lua 5.1
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.1.5"

      - name: Regenerate Lua outputs for changed Luau modules
        shell: bash
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${BEFORE:-}" || "${BEFORE}" =~ ^0+$ ]]; then
            changed_files="$(git show --name-only --pretty=format: "${AFTER}")"
          else
            changed_files="$(git diff --name-only "${BEFORE}" "${AFTER}")"
          fi

          while IFS= read -r path; do
            [[ -n "$path" ]] || continue
            [[ "$path" == modules/* ]] || continue
            [[ "$path" =~ \.module\.luau$ ]] || continue

            out_path="${path%.module.luau}.module.lua"
            mkdir -p "$(dirname "$out_path")"

            ./darklua process --config .darklua.json5 "$path" "$out_path"

            node scripts/polyfill.js "$out_path"
            node scripts/compatibility.js "$out_path"

            cp "$out_path" "$out_path.raw"
            # lua "$out_path.raw"
          done <<< "$changed_files"

      - name: Fail if outputs were not committed
        run: git diff --exit-code

      - name: Bypass Cloudflare for GitHub Action
        uses: xiaotianxt/bypass-cloudflare-for-github-action@v2.1.0
        with:
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
          cf_zone_id: ${{ secrets.CF_ZONE_ID }}
          cf_api_token: ${{ secrets.CF_API_TOKEN }}
          disable_bot_fight_mode: 'true'

      - uses: obbywiki/wikiwire@93219a71db2e2d33b6fc916e85f7a782082f5783
        env:
          GITHUB_TOKEN: ${{ secrets.WIKIWIRE_GITHUB_TOKEN }}
        with:
          username: WikiWireBot@WikiWire
          password: ${{ secrets.WIKIWIRE_PASSWORD }}
