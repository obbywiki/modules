name: WikiWire

# on:
#   push:
#     branches: [main]
#     paths:
#       - 'modules/**'
#       - 'modules/*'
#       - 'templates/**'
#       - 'templates/*'

jobs:
  wikiwire:
    runs-on: ubuntu-latest
    name: Sync files to production MediaWiki
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: obbywiki/wikiwire@2048ee4561096dba95e14d2011e36d7a70cad337
        env:
            GITHUB_TOKEN: ${{ secrets.WIKIWIRE_GITHUB_TOKEN }}
        with:
          username: WikiWireBot@WikiWire
          password: ${{ secrets.WIKIWIRE_PASSWORD }}